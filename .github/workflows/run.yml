name: Run

on:
  workflow_dispatch:
    inputs:
      run_description:
        description: 'description'
        required: false
        default: nightly
  push:
    branches:
      - run
    paths:
      - trigger/*

# Cancel any previous run on this branch — only one tunnel at a time.
concurrency:
  group: run-tunnel
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
      with:
        ref: run

    - name: Setup Git
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Install Cloudflared
      run: |
        wget https://github.com/cloudflare/cloudflared/releases/download/2026.7.1/cloudflared-linux-amd64.deb
        sudo dpkg -i cloudflared-linux-amd64.deb
        sudo sysctl -w net.core.rmem_max=7500000
        sudo sysctl -w net.core.wmem_max=7500000
    - name: Install Wireguard
      run: |
        sudo apt-get install -y wireguard
    - name: Configure Wireguard
      run: |
        echo "${{ secrets.WIREGUARD_CONFIG }}" | sudo tee /etc/wireguard/wg0.conf
      shell: bash
    - name: Start Wireguard
      run: |
          # sudo sysctl -w net.ipv4.ip_forward=1
          sudo wg-quick up wg0
          ifconfig
          sysctl net.ipv4.ip_forward
          sudo iptables -t nat -L

    - name: Configure DNS
      run: |
        echo "DNSStubListener=yes" | sudo tee -a /etc/systemd/resolved.conf
        echo "DNSStubListenerExtra=0.0.0.0" | sudo tee -a /etc/systemd/resolved.conf
        sudo systemctl restart systemd-resolved

    - name: Install Server
      run: |
       wget https://github.com/xiguichen/tcpudp/releases/download/nightly/tcpudp-ubuntu-latest.tar.gz
       ls
       tar xvf tcpudp-ubuntu-latest.tar.gz
       chmod +x tcpudp-ubuntu-latest/server
    - name: Start Server (background)
      run: |
        # Start server first so the port is listening when cloudflared connects
        echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) Starting server..."
        nohup tcpudp-ubuntu-latest/server --port=7001 > server.log 2>&1 &
        SERVER_PID=$!
        echo "Server PID: $SERVER_PID"
        # Wait for the server to be ready
        for i in $(seq 1 15); do
          if nc -z localhost 7001 2>/dev/null; then
            echo "Server is listening on port 7001"
            break
          fi
          echo "  waiting for server to be ready (attempt $i/15)..."
          sleep 1
        done
        # Save PID so the foreground step can monitor it
        echo "$SERVER_PID" > /tmp/server_pid
    - name: Run Cloudflared
      run: |
        TUNNEL_TRANSPORT_PROTOCOL=http2 cloudflared tunnel --url tcp://localhost:7001 --logfile cloudflare.log &
        CLOUDFLARED_PID=$!
        echo "$CLOUDFLARED_PID" > /tmp/cloudflared_pid
        date +%s > /tmp/cloudflared_start
        until grep -q "https.*trycloudflare.com" cloudflare.log; do sleep 1; done
        HOSTNAME=$(cat cloudflare.log | grep -o "https.*trycloudflare.com")
        mkdir -p ${{ github.workspace }}/github_run
        echo -n "cloudflared access tcp --url tcp://localhost:7001 --hostname " > ${{ github.workspace }}/github_run/cloudflare.sh
        echo "$HOSTNAME" >> ${{ github.workspace }}/github_run/cloudflare.sh
        cp ${{ github.workspace }}/github_run/cloudflare.sh ${{ github.workspace }}/github_run/cloudflare.bat
        chmod +x ${{ github.workspace }}/github_run/cloudflare.sh
        # Backward compat: also write to root
        cp ${{ github.workspace }}/github_run/cloudflare.sh ${{ github.workspace }}/cloudflare.sh
        cp ${{ github.workspace }}/github_run/cloudflare.bat ${{ github.workspace }}/cloudflare.bat
        # Write machine-readable run info
        echo "{\"hostname\":\"$HOSTNAME\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"port\":7001}" > ${{ github.workspace }}/github_run/run_info.json
        echo "Cloudflared tunnel registered: $HOSTNAME"
    - name: Commit Change
      working-directory: ${{ github.workspace }}
      run: |
          git add github_run/ cloudflare.sh cloudflare.bat
          git commit -m "Auto-update cloudflare tunnel info"
          git push origin run
     

    - name: Keep Services Alive
      run: |
        # Monitor and restart server + cloudflared so the tunnel stays up.
        while true; do
          # --- Server ---
          SERVER_PID=$(cat /tmp/server_pid 2>/dev/null || echo "")
          if [ -n "$SERVER_PID" ] && kill -0 "$SERVER_PID" 2>/dev/null; then
            true
          else
            echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) Server not running. Restarting..."
            nohup tcpudp-ubuntu-latest/server --port=7001 > server.log 2>&1 &
            echo $! > /tmp/server_pid
            echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) Server restarted (PID $!)"
          fi

          # --- Cloudflared ---
          # Restart if PID dies. HTTP/2 transport avoids QUIC blocking.
          CF_PID=$(cat /tmp/cloudflared_pid 2>/dev/null || echo "")
          SHOULD_RESTART=false
          if [ -z "$CF_PID" ] || ! kill -0 "$CF_PID" 2>/dev/null; then
            echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) Cloudflared PID dead. Restarting..."
            SHOULD_RESTART=true
          fi
          if $SHOULD_RESTART; then
            # Truncate old log so grep works on fresh output
            : > cloudflare.log
            TUNNEL_TRANSPORT_PROTOCOL=http2 cloudflared tunnel --url tcp://localhost:7001 --logfile cloudflare.log &
            CF_PID=$!
            echo "$CF_PID" > /tmp/cloudflared_pid
            date +%s > /tmp/cloudflared_start
            # Wait for new hostname
            for i in $(seq 1 30); do
              if grep -q "https.*trycloudflare.com" cloudflare.log 2>/dev/null; then break; fi
              sleep 1
            done
            HOSTNAME=$(grep -o "https.*trycloudflare.com" cloudflare.log 2>/dev/null || echo "")
            if [ -z "$HOSTNAME" ]; then
              echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) Cloudflared failed to get hostname. Will retry."
              continue
            fi
            echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) New tunnel: $HOSTNAME"
            # Update cloudflare.sh with new hostname
            mkdir -p ${{ github.workspace }}/github_run
            echo -n "cloudflared access tcp --url tcp://localhost:7001 --hostname " > ${{ github.workspace }}/github_run/cloudflare.sh
            echo "$HOSTNAME" >> ${{ github.workspace }}/github_run/cloudflare.sh
            cp ${{ github.workspace }}/github_run/cloudflare.sh ${{ github.workspace }}/github_run/cloudflare.bat
            cp ${{ github.workspace }}/github_run/cloudflare.sh ${{ github.workspace }}/cloudflare.sh
            cp ${{ github.workspace }}/github_run/cloudflare.bat ${{ github.workspace }}/cloudflare.bat
            echo "{\"hostname\":\"$HOSTNAME\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"port\":7001}" > ${{ github.workspace }}/github_run/run_info.json
            # Push updated hostname so clients can pick it up
            cd ${{ github.workspace }}
            git add github_run/ cloudflare.sh cloudflare.bat
            git commit -m "Auto-update cloudflare tunnel info" || true
            git push origin run || echo "Push failed — will retry on next restart"
          fi

          sleep 5
        done
