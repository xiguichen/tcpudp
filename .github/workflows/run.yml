name: Run

on:
  workflow_dispatch:
    inputs:
      run_description:
        description: 'description'
        required: false
        default: nightly
  push:
    branches:
      - run
    paths:
      - trigger/*

# Cancel any previous run on this branch — only one tunnel at a time.
concurrency:
  group: run-tunnel
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
      with:
        ref: run

    - name: Setup Git
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Install Cloudflared
      run: |
        wget https://github.com/cloudflare/cloudflared/releases/download/2025.2.1/cloudflared-linux-amd64.deb
        sudo dpkg -i cloudflared-linux-amd64.deb
        sudo sysctl -w net.core.rmem_max=7500000
        sudo sysctl -w net.core.wmem_max=7500000
    - name: Install Wireguard
      run: |
        sudo apt-get install -y wireguard
    - name: Configure Wireguard
      run: |
        echo "${{ secrets.WIREGUARD_CONFIG }}" | sudo tee /etc/wireguard/wg0.conf
      shell: bash
    - name: Start Wireguard
      run: |
          # sudo sysctl -w net.ipv4.ip_forward=1
          sudo wg-quick up wg0
          ifconfig
          sysctl net.ipv4.ip_forward
          sudo iptables -t nat -L

    - name: Configure DNS
      run: |
        echo "DNSStubListener=yes" | sudo tee -a /etc/systemd/resolved.conf
        echo "DNSStubListenerExtra=0.0.0.0" | sudo tee -a /etc/systemd/resolved.conf
        sudo systemctl restart systemd-resolved

    - name: Install Server
      run: |
       wget https://github.com/xiguichen/tcpudp/releases/download/nightly/tcpudp-ubuntu-latest.tar.gz
       ls
       tar xvf tcpudp-ubuntu-latest.tar.gz
       chmod +x tcpudp-ubuntu-latest/server
    - name: Run Cloudflared
      run: |
        sudo cloudflared tunnel --url tcp://localhost:7001 --logfile cloudflare.log &
        until grep -q "https.*trycloudflare.com" cloudflare.log; do sleep 1; done
        HOSTNAME=$(cat cloudflare.log | grep -o "https.*trycloudflare.com")
        mkdir -p ${{ github.workspace }}/github_run
        echo -n "cloudflared access tcp --url tcp://localhost:7001 --hostname " > ${{ github.workspace }}/github_run/cloudflare.sh
        echo "$HOSTNAME" >> ${{ github.workspace }}/github_run/cloudflare.sh
        cp ${{ github.workspace }}/github_run/cloudflare.sh ${{ github.workspace }}/github_run/cloudflare.bat
        chmod +x ${{ github.workspace }}/github_run/cloudflare.sh
        # Backward compat: also write to root
        cp ${{ github.workspace }}/github_run/cloudflare.sh ${{ github.workspace }}/cloudflare.sh
        cp ${{ github.workspace }}/github_run/cloudflare.bat ${{ github.workspace }}/cloudflare.bat
        # Write machine-readable run info
        echo "{\"hostname\":\"$HOSTNAME\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"port\":7001}" > ${{ github.workspace }}/github_run/run_info.json
        # Verify the cloudflared tunnel is actually working before we commit
        echo "Verifying cloudflared tunnel..."
        for i in $(seq 1 10); do
          if curl -sS --max-time 3 "https://$HOSTNAME" 2>/dev/null || true; then
            echo "Tunnel reachable via HTTPS check"
            break
          fi
          echo "  waiting for tunnel to be ready (attempt $i/10)..."
          sleep 2
        done
    - name: Commit Change
      working-directory: ${{ github.workspace }}
      run: |
          git add github_run/ cloudflare.sh cloudflare.bat
          git commit -m "Auto-update cloudflare tunnel info"
          git push origin run
     

    - name: Run Server
      run: |
        # Keep the server alive: restart on crash so the tunnel stays up.
        while true; do
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) Starting server..."
          tcpudp-ubuntu-latest/server --port=7001
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) Server exited. Restarting in 3s..."
          sleep 3
        done
